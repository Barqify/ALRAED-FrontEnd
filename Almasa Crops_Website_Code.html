<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<!-- ================================================================
🔧 META TAGS & TITLES
================================================================ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="الماسة للمحاصيل الزراعية - تصدير أجود المنتجات الزراعية المصرية للعالم">
<title>ALMASA CROPS - الماسة للمحاصيل الزراعية</title>

<!-- ================================================================
🔗 FONTS & ICONS
================================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ================================================================
🎨 CSS VARIABLES
================================================================ */
:root {
  --brand: #a5855a;
  --brand-light: #d3b687;
  --brand-dark: #9b7a4d;
  --brand-pale: #f5efe6;
  --bg-dark: #1a1714;
  --bg-darker: #121010;
  --bg-light: #faf8f5;
  --bg-white: #ffffff;
  --text-dark: #2a2520;
  --text-body: #5a5550;
  --text-muted: #9a958e;
  --text-light: #ece6dc;
  --border-light: #e8e0d4;
  --border-brand: rgba(165, 133, 90, 0.3);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.07);
  --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.10);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s ease;
  --navbar-h: 72px;
}

/* ================================================================
🔄 RESET & BASE STYLES
================================================================ */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg-light);
  color: var(--text-body);
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
a {
  text-decoration: none;
  color: inherit;
  transition: var(--transition);
}
ul {
  list-style: none;
}
img {
  max-width: 100%;
  display: block;
}
button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
}
input,
textarea,
select {
  font-family: inherit;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ================================================================
🎬 ANIMATIONS & LANGUAGE FADE
================================================================ */
@keyframes heroReveal {
  from {
    opacity: 0;
    transform: translateY(24px);
    filter: blur(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}
@keyframes pulseRing {
  0% {
    transform: scale(1);
    opacity: .6;
  }
  100% {
    transform: scale(1.6);
    opacity: 0;
  }
}
@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-6px);
  }
}
@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }
  100% {
    background-position: 200% 0;
  }
}
@keyframes langFadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.anim {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity .6s ease, transform .6s ease;
}
.anim.vis {
  opacity: 1;
  transform: translateY(0);
}
.anim.vis.d1 { transition-delay: .1s; }
.anim.vis.d2 { transition-delay: .2s; }
.anim.vis.d3 { transition-delay: .3s; }
.anim.vis.d4 { transition-delay: .4s; }
.anim.vis.d5 { transition-delay: .5s; }
.lang-fade {
  animation: langFadeIn 0.3s ease-out;
}

/* ================================================================
📱 NAVBAR
================================================================ */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--navbar-h);
  background: rgba(18, 16, 16, .92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(165, 133, 90, .1);
  z-index: 1000;
  transition: var(--transition);
}
.navbar.scrolled {
  box-shadow: 0 4px 30px rgba(0, 0, 0, .3);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-logo img {
  max-height: var(--navbar-h);
  width: auto;
}
.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 17px;
  font-weight: 800;
  font-family: 'Playfair Display', serif;
}
.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.nav-logo-en {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--brand-light);
  letter-spacing: 1.2px;
}
.nav-logo-ar {
  font-size: 11px;
  color: var(--text-light);
  opacity: .6;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav-link {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-light);
  border-radius: var(--radius-sm);
  position: relative;
  transition: var(--transition);
}
.nav-link:hover,
.nav-link.active {
  color: var(--brand-light);
  background: rgba(165, 133, 90, .08);
}
.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 2px;
  background: var(--brand-light);
  border-radius: 2px;
}
.lang-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: rgba(165, 133, 90, .1);
  border: 1px solid rgba(165, 133, 90, .2);
  border-radius: var(--radius-sm);
  color: var(--brand-light);
  font-size: 13px;
  font-weight: 600;
  transition: var(--transition);
  cursor: pointer;
}
.lang-btn:hover {
  background: rgba(165, 133, 90, .18);
  border-color: var(--brand);
}
.lang-btn .btn-text {
  display: inline-block;
  min-width: 40px;
  text-align: center;
  transition: var(--transition);
}
.lang-btn:hover .btn-text {
  transform: scale(1.05);
}
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 8px;
  cursor: pointer;
}
.hamburger span {
  width: 22px;
  height: 2px;
  background: var(--brand-light);
  border-radius: 2px;
  transition: var(--transition);
}
.hamburger.open span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
}
.hamburger.open span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}
.mob-menu {
  display: none;
  position: fixed;
  top: var(--navbar-h);
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(18, 16, 16, .98);
  backdrop-filter: blur(20px);
  z-index: 999;
  padding: 32px 24px;
  flex-direction: column;
  gap: 6px;
  animation: heroReveal .3s ease;
}
.mob-menu.open {
  display: flex;
}
.mob-menu .nav-link {
  font-size: 17px;
  padding: 14px 20px;
  border-radius: var(--radius-md);
}
.mob-menu .lang-btn {
  margin-top: 16px;
  justify-content: center;
  padding: 14px;
  font-size: 15px;
}

/* ================================================================
🔘 BUTTONS
================================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 30px;
  font-size: 15px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  transition: var(--transition);
  white-space: nowrap;
}
.btn-brand {
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  color: #fff;
  box-shadow: 0 4px 15px rgba(165, 133, 90, .3);
}
.btn-brand:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(165, 133, 90, .4);
}
.btn-outline {
  border: 1.5px solid rgba(165, 133, 90, .4);
  color: var(--brand);
  background: transparent;
}
.btn-outline:hover {
  background: rgba(165, 133, 90, .08);
  border-color: var(--brand);
}
.btn-white {
  background: #fff;
  color: var(--brand-dark);
  box-shadow: 0 4px 15px rgba(0, 0, 0, .1);
}
.btn-white:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(0, 0, 0, .15);
}
.btn-sm {
  padding: 9px 20px;
  font-size: 13px;
}
.btn-lg {
  padding: 16px 36px;
  font-size: 16px;
}
.btn-wa {
  background: #25D366;
  color: #fff;
  box-shadow: 0 4px 12px rgba(37, 211, 102, .3);
}
.btn-wa:hover {
  background: #1fa855;
  transform: translateY(-2px);
}

/* ================================================================
🎯 HERO SECTION
================================================================ */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding-top: var(--navbar-h);
}
.hero-video-wrap {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: var(--bg-darker);
}
.hero-video-wrap video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
  opacity: 0.30;
}
.hero-video-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(180deg, rgba(14, 12, 10, .82) 0%, rgba(14, 12, 10, .32) 40%, rgba(14, 12, 10, .50) 72%, rgba(14, 12, 10, .92) 100%), radial-gradient(ellipse at 30% 40%, rgba(165, 133, 90, .06) 0%, transparent 60%);
}
.hero-pattern {
  position: absolute;
  inset: 0;
  z-index: 2;
  opacity: .025;
  background-image: repeating-linear-gradient(45deg, var(--brand) 0, var(--brand) 1px, transparent 1px, transparent 50px);
}
.hero-content {
  position: relative;
  z-index: 3;
  text-align: center;
  max-width: 920px;
  margin: 0 auto;
  padding: 0 24px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: rgba(165, 133, 90, .08);
  border: 1px solid rgba(165, 133, 90, .15);
  border-radius: 50px;
  font-size: 13px;
  color: var(--brand-light);
  font-weight: 500;
  margin-bottom: 28px;
  animation: heroReveal .8s ease .2s both;
}
.hero-title {
  font-size: clamp(32px, 5vw, 62px);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 16px;
  animation: heroReveal .8s ease .4s both;
}
.hero-title .gold {
  background: linear-gradient(135deg, var(--brand-light), var(--brand), var(--brand-dark), var(--brand-light));
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 5s ease infinite;
}
.hero-title .white {
  color: var(--text-light);
}
[dir="ltr"] .hero-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.hero-tagline {
  font-size: clamp(18px, 2.5vw, 24px);
  font-weight: 600;
  color: var(--brand-light);
  margin-bottom: 20px;
  animation: heroReveal .8s ease .5s both;
}
[dir="ltr"] .hero-tagline {
  font-family: 'Montserrat', sans-serif;
}
.hero-sub {
  font-size: clamp(14px, 1.7vw, 17px);
  color: rgba(236, 230, 220, .6);
  max-width: 680px;
  margin: 0 auto 36px;
  line-height: 1.85;
  animation: heroReveal .8s ease .6s both;
}
.hero-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  animation: heroReveal .8s ease .8s both;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 36px;
  margin-top: 56px;
  padding-top: 36px;
  border-top: 1px solid rgba(165, 133, 90, .12);
  animation: heroReveal .8s ease 1s both;
}
.hero-stat {
  text-align: center;
}
.hero-stat-num {
  font-size: 36px;
  font-weight: 800;
  color: var(--brand-light);
  line-height: 1;
  font-family: 'Playfair Display', serif;
}
.hero-stat-num span {
  font-size: 26px;
}
.hero-stat-label {
  font-size: 12px;
  color: rgba(236, 230, 220, .45);
  margin-top: 6px;
  font-weight: 500;
  line-height: 1.4;
}
.hero-scroll {
  position: absolute;
  bottom: 40px;
  left: 0;
  right: 0;
  margin: 0 auto;
  width: fit-content;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--brand-light);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  animation: float 2.5s ease infinite;
  z-index: 3;
  opacity: 0.8;
  transition: opacity 0.3s ease;
  text-align: center;
}
.hero-scroll:hover {
  opacity: 1;
  transform: scale(1.05);
}

/* ================================================================
🎥 VIDEO GALLERY
================================================================ */
.video-gallery-section {
  padding: 70px 0;
  background: var(--bg-white);
}
.video-gallery-track {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 8px 0;
  direction: ltr;
}
.video-gallery-track::-webkit-scrollbar {
  display: none;
}
.video-card {
  min-width: 320px;
  max-width: 320px;
  height: 220px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
  scroll-snap-align: start;
  cursor: pointer;
  transition: var(--transition);
  background: var(--bg-darker);
}
.video-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.video-card .video-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--brand-dark), var(--brand));
  position: relative;
}
.video-card .video-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.85;
}
.video-card .play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, .25);
  transition: var(--transition);
}
.video-card:hover .play-overlay {
  background: rgba(0, 0, 0, .15);
}
.video-play-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255, 255, 255, .95);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brand);
  font-size: 20px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
  transition: var(--transition);
}
.video-card:hover .video-play-btn {
  transform: scale(1.08);
  background: var(--brand);
  color: #fff;
}
.video-card .video-iframe {
  display: none;
  width: 100%;
  height: 100%;
  border: 0;
}
.video-card.active .video-placeholder {
  display: none;
}
.video-card.active .video-iframe {
  display: block;
}
.video-card-title {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 14px 14px;
  background: linear-gradient(transparent, rgba(0, 0, 0, .75));
  color: #fff;
  font-size: 14px;
  font-weight: 600;
}

/* ================================================================
📐 SECTIONS COMMON
================================================================ */
.section {
  padding: 80px 0;
}
.sec-head {
  text-align: center;
  margin-bottom: 52px;
}
.sec-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--brand);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 14px;
}
[dir="ltr"] .sec-label {
  letter-spacing: 3px;
}
.sec-title {
  font-size: clamp(26px, 3.8vw, 40px);
  font-weight: 800;
  color: var(--text-dark);
  line-height: 1.2;
  margin-bottom: 14px;
}
[dir="ltr"] .sec-title {
  font-family: 'Playfair Display', serif;
}
.sec-desc {
  font-size: 15px;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
}

/* ================================================================
🖼️ GALLERY & CARDS
================================================================ */
.home-gallery-strip {
  padding: 36px 0;
  background: var(--bg-darker);
  position: relative;
}
.home-gallery-strip::before,
.home-gallery-strip::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 80px;
  z-index: 2;
  pointer-events: none;
}
.home-gallery-strip::before {
  left: 0;
  background: linear-gradient(to right, var(--bg-darker), transparent);
}
.home-gallery-strip::after {
  right: 0;
  background: linear-gradient(to left, var(--bg-darker), transparent);
}
.home-gallery-strip .gallery-track {
  gap: 20px;
  padding: 8px 24px 8px;
  scroll-padding: 24px;
}
.home-gallery-strip .gallery-card {
  min-width: 300px;
  max-width: 300px;
  height: 200px;
  border: 1px solid rgba(165, 133, 90, .12);
  scroll-snap-align: center;
}
.home-gallery-strip .gallery-card-overlay {
  padding: 16px 14px 12px;
  background: linear-gradient(transparent, rgba(0, 0, 0, .7));
}
.home-gallery-strip .gallery-card-title {
  font-size: 14px;
}
.cats-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 18px;
}
.cat-card {
  background: var(--bg-white);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 24px 18px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.cat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--brand-light), var(--brand-dark));
  transform: scaleX(0);
  transition: var(--transition);
}
.cat-card:hover::before {
  transform: scaleX(1);
}
.cat-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-brand);
}
.cat-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 12px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: var(--transition);
}
.cat-card:hover .cat-icon {
  transform: scale(1.1);
}
.cat-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 5px;
  line-height: 1.3;
}
.cat-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
}
.prods-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.prod-card {
  background: var(--bg-white);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: var(--transition);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.prod-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-brand);
}
.prod-img {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--brand-pale), #fff);
}
.prod-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: var(--transition);
}
.prod-card:hover .prod-img img {
  transform: scale(1.05);
}
.prod-img .prod-icon-fb {
  font-size: 40px;
  color: rgba(165, 133, 90, .7);
  transition: var(--transition);
  position: absolute;
}
.prod-card:hover .prod-img .prod-icon-fb {
  transform: scale(1.12);
  color: var(--brand);
}
.prod-badge-cat {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 4px 12px;
  background: rgba(255, 255, 255, .95);
  color: var(--brand-dark);
  font-size: 10px;

/* ================================================================
📰 NEWS & CAROUSEL
================================================================ */

}

}

  overflow: hidden;
  background-size: cover;
  background-position: center;
}
.news-img::after {
  content: '';
  position: absolute;

}
.news-date-badge {

  right: 12px;
  padding: 6px 14px;

[dir="rtl"] .news-date-badge {

  left: 12px;
}
.news-loc-badge {
  position: absolute;
  bottom: 12px;
  right: 12px;
  padding: 5px 12px;
  background: rgba(0, 0, 0, .6);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
  border-radius: 50px;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 5px;
  backdrop-filter: blur(4px);
}
[dir="rtl"] .news-loc-badge {
  right: auto;
  left: 12px;
}
.news-body {
  padding: 20px;
}
.news-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 8px;
  line-height: 1.4;
}
.news-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 16px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.news-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.news-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--brand);
  transition: var(--transition);
}
.news-link:hover {
  gap: 10px;
  color: var(--brand-dark);
}
.news-inquiry {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  transition: var(--transition);
}
.news-inquiry:hover {
  transform: scale(1.03);
  box-shadow: 0 4px 12px rgba(165, 133, 90, .3);
}
.carousel-wrap {
  position: relative;
  display: none;
}
.carousel-track {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 4px 20px;
  scroll-padding: 20px;
}
.carousel-track::-webkit-scrollbar {
  display: none;
}
.carousel-track .cat-card,
.carousel-track .prod-card,
.carousel-track .news-card,
.carousel-track .gallery-card,
.carousel-track .video-card {
  scroll-snap-align: center;
}
.carousel-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-white);
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--brand);
  box-shadow: var(--shadow-md);
  z-index: 10;
  transition: var(--transition);
  cursor: pointer;
}
.carousel-arrow:hover {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.carousel-arrow.prev {
  left: -8px;
  right: auto;
}
.carousel-arrow.next {
  right: -8px;
  left: auto;
}
[dir="rtl"] .carousel-arrow.prev {
  left: auto;
  right: -8px;
}
[dir="rtl"] .carousel-arrow.next {
  right: auto;
  left: -8px;
}
.carousel-wrap.gallery-carousel .carousel-arrow.prev,
.carousel-wrap.video-carousel .carousel-arrow.prev {
  left: 8px;
  right: auto;
}
.carousel-wrap.gallery-carousel .carousel-arrow.next,
.carousel-wrap.video-carousel .carousel-arrow.next {
  right: 8px;
  left: auto;
}
[dir="rtl"] .carousel-wrap.gallery-carousel .carousel-arrow.prev,
[dir="rtl"] .carousel-wrap.video-carousel .carousel-arrow.prev {
  left: auto;
  right: 8px;
}
[dir="rtl"] .carousel-wrap.gallery-carousel .carousel-arrow.next,
[dir="rtl"] .carousel-wrap.video-carousel .carousel-arrow.next {
  right: auto;
  left: 8px;
}
.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 20px;
}
.carousel-dot {
  width: 8px;
  height: 8px;

  transition: var(--transition);
  cursor: pointer;
  border: none;
}

  background: var(--brand);
  width: 24px;
  border-radius: 4px;
}
.gallery-section {

  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 8px 24px;
  scroll-padding: 24px;
}
.gallery-track::-webkit-scrollbar {
  display: none;

/* ================================================================
🔄 CAROUSEL
================================================================ */
function initCarousel(trackId, interval) {
  var track = document.getElementById(trackId);
  if (!track) return;
  var isRtl = lang === 'ar';
  track.style.direction = 'ltr';
  track.style.scrollSnapType = 'x mandatory';
  var items = track.children;
  if (items.length <= 1) return;
  var currentIndex = 0,
      isPaused = false,
      resizeTimer;

  function getGap() {
    var g = getComputedStyle(track).gap,
        p = parseInt(g);
    return (p && p > 0) ? p : 16;
  }

  function cw() {
    return items[0].offsetWidth + getGap();
  }

  function maxScroll() {
    return Math.max(0, track.scrollWidth - track.clientWidth);
  }

  function totalSteps() {
    var m = maxScroll();
    return m > 0 ? Math.round(m / cw()) : 0;
  }

  function goToStep(idx) {
    var t = totalSteps();
    idx = Math.max(0, Math.min(idx, t));
    currentIndex = idx;
    track.scrollTo({ left: idx * cw(), behavior: 'smooth' });
    updateDots(idx);
  }

  function nextStep() {
    if (isPaused) return;
    var t = totalSteps();
    var nextIdx = (currentIndex >= t ? 0 : currentIndex + 1);
    goToStep(nextIdx);
  }

  function updateDots(idx) {
    var d = document.getElementById(trackId + '-dots');
    if (!d) return;
    var dots = d.querySelectorAll('.carousel-dot');
    for (var i = 0; i < dots.length; i++)
      dots[i].classList.toggle('active', i === idx);
  }

  function createDots() {
    var d = document.getElementById(trackId + '-dots');
    if (!d) return;
    var t = totalSteps() + 1;
    d.innerHTML = '';
    for (var i = 0; i < t; i++) {
      (function(idx) {
        var btn = document.createElement('button');
        btn.className = 'carousel-dot' + (idx === 0 ? ' active' : '');
        btn.onclick = function() {
          goToStep(idx);
        };
        d.appendChild(btn);
      })(i);
    }
  }

  var wrap = track.closest('.carousel-wrap');
  if (wrap) {
    var pb = wrap.querySelector('.prev'),
        nb = wrap.querySelector('.next');
    if (pb) pb.onclick = function() {
      var t = totalSteps();
      var prevIdx = (currentIndex <= 0 ? t : currentIndex - 1);
      goToStep(prevIdx);
    };
    if (nb) nb.onclick = function() {
      var t = totalSteps();
      var nextIdx = (currentIndex >= t ? 0 : currentIndex + 1);
      goToStep(nextIdx);
    };
    wrap.addEventListener('mouseenter', function() {
      isPaused = true;
    });
    wrap.addEventListener('mouseleave', function() {
      isPaused = false;
    });
  }

  track.addEventListener('touchstart', function() {
    isPaused = true;
  }, { passive: true });
  track.addEventListener('touchend', function() {
    setTimeout(function() {
      isPaused = false;
    }, 2000);
  }, { passive: true });

  var st;
  track.addEventListener('scroll', function() {
    clearTimeout(st);
    st = setTimeout(function() {
      var t = totalSteps();
      currentIndex = Math.round(track.scrollLeft / cw());
      currentIndex = Math.max(0, Math.min(currentIndex, t));
      updateDots(currentIndex);
    }, 80);
  }, { passive: true });

  createDots();
  carouselIntervals.push(setInterval(nextStep, interval));
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      goToStep(currentIndex);
    }, 150);
  });
}

function initVideoCards() {

    if (ph && ifr) {

        ifr.src = ifr.src;
      };
    }
  });
}

    '<section class="page-hero"><div class="page-hero-bg"></div><div class="page-hero-pattern"></div><div class="page-hero-content"><div class="breadcrumb"><a href="#/" onclick="nav(\'/\')">' + t('nav.home') + '</a><span class="sep">/</span><span>' + t('nav.contact') + '</span></div><h1 class="page-hero-title"><span class="gold">' + t('contact.hero') + '</span></h1><p class="page-hero-desc">' + t('contact.heroDesc') + '</p></div></section>' +
    '<section class="section"><div class="container"><div class="contact-grid"><div class="contact-info"><div class="c-card anim"><div class="c-card-icon"><i class="fas fa-map-marker-alt"></i></div><div><div class="c-card-label">' + t('contact.info.address') + '</div><div class="c-card-value">' + t('contact.info.addressVal') + '</div></div></div><div class="c-card anim d1"><div class="c-card-icon"><i class="fas fa-phone"></i></div><div><div class="c-card-label">' + t('contact.info.phone') + '</div><div class="c-card-value">' + t('contact.info.phoneVal').split('\n').join('<br>') + '</div></div></div><div class="c-card anim d2"><div class="c-card-icon"><i class="fas fa-envelope"></i></div><div><div class="c-card-label">' + t('contact.info.email') + '</div><div class="c-card-value">' + t('contact.info.emailVal') + '</div></div></div><div class="c-card anim d3"><div class="c-card-icon"><i class="fas fa-clock"></i></div><div><div class="c-card-label">' + t('contact.info.hours') + '</div><div class="c-card-value">' + t('contact.info.hoursVal') + '</div></div></div><div class="contact-socials anim d4"><span>' + t('contact.socials') + '</span><a href="#" class="soc-link"><i class="fab fa-facebook-f"></i></a><a href="#" class="soc-link"><i class="fab fa-instagram"></i></a><a href="#" class="soc-link"><i class="fab fa-linkedin-in"></i></a><a href="#" class="soc-link"><i class="fab fa-x-twitter"></i></a></div><a href="https://wa.me/201098765432" target="_blank" class="btn btn-wa btn-lg anim d5" style="width:100%;justify-content:center;margin-top:4px"><i class="fab fa-whatsapp"></i> ' + t('contact.waBtn') + '</a></div><div class="form-card anim d2"><h3 style="font-size:19px;font-weight:700;color:var(--text-dark);margin-bottom:24px">' + t('contact.form.title') + '</h3><form id="c-form" onsubmit="submitForm(event)"><div class="form-row"><div class="form-group" id="fg-n"><label class="form-label">' + t('contact.form.name') + '</label><input class="form-input" id="f-n" required><div class="form-error">' + er + '</div></div><div class="form-group" id="fg-e"><label class="form-label">' + t('contact.form.email') + '</label><input type="email" class="form-input" id="f-e" required><div class="form-error">' + ee + '</div></div></div><div class="form-group" id="fg-p"><label class="form-label">' + t('contact.form.phone') + '</label><input type="tel" class="form-input" id="f-p" placeholder="' + (lang === 'ar' ? 'أدخل رقم الهاتف' : 'Enter phone number') + '"></div><div class="form-group" id="fg-m"><label class="form-label">' + t('contact.form.message') + '</label><textarea class="form-textarea" id="f-m" rows="5" required></textarea><div class="form-error">' + er + '</div></div><button type="submit" class="btn btn-brand btn-lg" style="width:100%;justify-content:center"><i class="fas fa-paper-plane"></i> ' + t('contact.form.submit') + '</button></form><div class="form-success" id="form-ok"><div class="form-success-icon"><i class="fas fa-check"></i></div><h3 class="form-success-title">' + t('contact.form.okTitle') + '</h3><p class="form-success-desc">' + t('contact.form.okDesc') + '</p><button class="btn btn-outline btn-sm" style="margin-top:18px" onclick="resetForm()">' + t('contact.form.again') + '</button></div></div></div></div></section>' +
    '<section class="section" style="padding-top:0;background:var(--bg-white)"><div class="container"><div class="map-section anim"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3456.789012345678!2d30.290583!3d30.885778!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDUzJzA4LjgiTiAzMMKwMTcnMjYuMSJF!5e0!3m2!1sen!2seg!4v1234567890123!5m2!1sen!2seg" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe><div class="map-label"><i class="fas fa-map-marker-alt"></i> <a href="https://maps.app.goo.gl/os2NaPWt4A4FEs8Y6" target="_blank" style="color:inherit">' + t('contact.mapLabel') + ' - ' + t('contact.mapOpen') + '</a></div></div></div></section>' +
    footer() + waFloat();
}

function submitForm(e) {
  e.preventDefault();
  var ok = true;
  ['fg-n', 'fg-e', 'fg-m'].forEach(function(id) {
    document.getElementById(id).classList.remove('err');
  });
  if (!document.getElementById('f-n').value.trim()) {
    document.getElementById('fg-n').classList.add('err');
    ok = false;
  }
  var emailVal = document.getElementById('f-e').value.trim();
  if (!emailVal || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
    document.getElementById('fg-e').classList.add('err');
    ok = false;
  }
  if (!document.getElementById('f-m').value.trim()) {
    document.getElementById('fg-m').classList.add('err');
    ok = false;
  }
  if (ok) {
    document.getElementById('c-form').style.display = 'none';
    document.getElementById('form-ok').classList.add('show');
  }
}

function resetForm() {
  document.getElementById('c-form').style.display = 'block';
  document.getElementById('form-ok').classList.remove('show');
  document.getElementById('c-form').reset();
}

/* ================================================================
🚀 RENDER & INIT
================================================================ */
function render() {
  stopCarousels();
  applyLang();
  var app = document.getElementById('app'),
      hash = (location.hash.slice(1)) || '/';
  if (hash !== route) route = hash;
  var html = '';
  if (route === '/' || route === '') html = pageHome();
  else if (route === '/about') html = pageAbout();
  else if (route === '/news') html = pageNews();
  else if (route === '/products') {
    html = pageProducts();
    var up = new URLSearchParams(location.hash.split('?')[1]),
        cp = up.get('cat');
    if (cp) setTimeout(function() {
      var b = document.querySelector('.filter-btn[data-cat="' + cp + '"]');
      if (b) filterProds(cp, b);
    }, 50);
  } else if (route.startsWith('/products/')) html = pageCat(route.replace('/products/', ''));
  else if (route === '/contact') html = pageContact();
  else html = pageHome();
  app.innerHTML = html;
  observeAnims();
  observeNav();
  animCounters();
  initVideoCards();
  setTimeout(function() {
    initCarousel('cats-track', 3000);
    initCarousel('prods-track', 3500);
    initCarousel('news-track', 4000);
    initCarousel('home-gallery-track', 3500);
    initCarousel('about-gallery-track', 3500);
    initCarousel('video-track', 4500);
    initCarousel('about-video-track', 4500);
  }, 100);
}

function observeAnims() {
  var obs = new IntersectionObserver(function(es) {
    es.forEach(function(e) {
      if (e.isIntersecting) {
        e.target.classList.add('vis');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.anim').forEach(function(el) {
    obs.observe(el);
  });
}

function observeNav() {
  var nb = document.getElementById('navbar');
  if (!nb) return;
  var tk = false;
  window.onscroll = function() {
    if (!tk) {
      requestAnimationFrame(function() {
        nb.classList.toggle('scrolled', scrollY > 40);
        tk = false;
      });
      tk = true;
    }
  };
  nb.classList.toggle('scrolled', scrollY > 40);
}

function animCounters() {
  var s = document.getElementById('hero-stats');
  if (!s || statsDone) return;
  var obs = new IntersectionObserver(function(es) {
    es.forEach(function(e) {
      if (e.isIntersecting && !statsDone) {
        statsDone = true;
        document.querySelectorAll('.hero-stat-num span[data-target]').forEach(function(el) {
          var tgt = +el.dataset.target,
              dur = 2000,
              st = performance.now();
          function step(now) {
            var p = Math.min((now - st) / dur, 1);
            el.textContent = Math.floor((1 - Math.pow(1 - p, 3)) * tgt);
            if (p < 1) requestAnimationFrame(step);
            else el.textContent = tgt;
          }
          requestAnimationFrame(step);
        });
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.3 });
  obs.observe(s);
}

window.addEventListener('hashchange', function() {
  var h = (location.hash.slice(1)) || '/';
  if (h !== route) {
    route = h;
    statsDone = false;
    render();
    scrollTo({ top: 0 });
  }
});
window.addEventListener('resize', function() {
  stopCarousels();
  setTimeout(function() {
    initCarousel('cats-track', 3000);
    initCarousel('prods-track', 3500);
    initCarousel('news-track', 4000);
    initCarousel('home-gallery-track', 3500);
    initCarousel('about-gallery-track', 3500);
    initCarousel('video-track', 4500);
    initCarousel('about-video-track', 4500);
  }, 100);
});
render();
</script>
